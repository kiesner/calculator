on:
  push:
  workflow_dispatch:
    inputs:
      RUN_TESTS:
        description: Run tests
        type: boolean
        default: false
        required: false
env:
  RUN_TESTS: ${{ github.event.inputs.RUN_TESTS || vars.RUN_TESTS || 'true' }}

jobs:
  cd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.14
      - name: init
        run: |
          echo 'step init'
          pwd && ls
          env
          echo ${{ secrets.DOCKERHUB_TOKEN }}
          echo ${{ env.RUN_TESTS }}
          java -version
          mvn -v
          docker version
      - name: Build maven package
        run: mvn package -DskipTests

      - if: env.RUN_TESTS == 'true'
        name: Run maven tests
        run: mvn test -P run-integration-tests

      - if: env.RUN_TESTS == 'true'
        name: Generate test report
        uses: dorny/test-reporter@v3
        with:
          name: Junit Tests Report
          reporter: java-junit
          path: target/surefire-reports/*.xml
          fail-on-error: false

      - if: env.RUN_TESTS == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: JaCoCo Coverage Report
          path: target/site/jacoco/

      - name: Build docker image
        run: docker build -t lion78at/calculator --no-cache .

      - name: Push docker image
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u lion78at --password-stdin
          docker push lion78at/calculator
        
