on:
  push:
  workflow_dispatch:
    inputs:
      RUN_TESTS:
        description: Run tests
        type: boolean
        default: false
        required: false
env:
  RUN_TESTS: ${{ github.event.inputs.RUN_TESTS || vars.RUN_TESTS || 'true' }}

jobs:
  cd:
    runs-on: self-hosted
    steps:
      - name: init
        run: |
          echo 'step init'
          pwd && ls
          env
          echo ${{ secrets.DOCKERHUB_TOKEN }}
          echo ${{ env.RUN_TESTS }}
          java -version
          mvn -v
          docker version
      - name: Build maven package
        run: mvn clean package -DskipTests

      - if: env.RUN_TESTS == 'true'
        name: Run maven tests
        run: mvn test -P run-integration-tests

      - if: env.RUN_TESTS == 'true'
        name: Generate test report
        uses: dorny/test-reporter@v3
        with:
          name: Junit Tests Report
          reporter: java-junit
          path: target/surefire-reports/*.xml
          fail-on-error: false

      - if: env.RUN_TESTS == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: JaCoCo Coverage Report
          path: target/site/jacoco/

      - name: Build docker image
        run: docker build -t ghcr.io/${{ github.repository }} --no-cache .

      - name: Push docker image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository }}

      - uses: azure/k8s-set-context@v5
        with:
           kubeconfig: ${{ secrets.KUBECONFIG_FILE }}
           context: kubernetes-admin@kubernetes

      - uses: Azure/k8s-deploy@v5
        with:
           namespace: 'default'
           annotate-resources: false
           manifests: |
              ./calculator-cd.yaml
        
